- type: entity
  parent: BaseItem
  id: MODSuitConstructionShell
  suffix: construction
  name: modular suit shell
  components:
  - type: Sprite
    sprite: Goobstation/MODSuits/modsuit_construction.rsi
    layers:
    - map: [ "enum.MODSuitVisualLayers.Base" ]
      state: mod
  - type: Construction
    graph: MODSuit
    node: start
    defaultTarget: modsuit
    containers:
    - parts
  - type: ContainerContainer
    parts: !type:Container

- type: entity
  parent: BaseItem
  id: MODSuitCore
  suffix: construction
  name: modular suit core
  components:
  - type: Sprite
    sprite: Goobstation/MODSuits/modsuit_construction.rsi
    state: core_standard
  - type: Tag
    tags:
    - MODSuitCore

